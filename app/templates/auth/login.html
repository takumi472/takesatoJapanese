<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - 武里日本語教室</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/icon-192.png') }}?v=1">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/icon-192.png') }}">
    
    <meta name="theme-color" content="#673ab7">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Vercel Speed Insights -->
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
    <style>
        body { background-color: #f0ebf8; }
        .login-container { max-width: 450px; margin: 100px auto; }
        .login-card {
            background-color: #ffffff;
            border-top: 10px solid #673ab7;
            border-radius: 8px;
            padding: 30px;
        }
    </style>
</head>
<body>

<div class="container login-container">
    <div class="login-card shadow-sm">
        <h2 class="h4 text-center mb-4 fw-bold">武里日本語教室<br><span class="text-muted fs-6">管理システム</span></h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show small" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="mb-3">
                <label for="username" class="form-label small fw-bold">ユーザー名 (メールアドレス)</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="example@gmail.com" required autocomplete="username">
            </div>

            <div class="mb-4">
                <label for="password" class="form-label small fw-bold">パスワード</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <div class="d-grid">
                <button type="submit" class="btn text-white fw-bold" style="background-color: #673ab7;">ログイン</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
