<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規受講生の登録＆学習記録</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
            window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
            const s = document.createElement('script');
            s.src = "/_vercel/speed-insights/script.js";
            s.defer = true;
            document.head.appendChild(s);
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0ebf8; }
        .form-container { max-width: 740px; margin: 30px auto; }
        .card-question { background-color: #ffffff; border: 1px solid #dadce0; border-radius: 8px; padding: 24px; margin-bottom: 12px; }
        .required-star { color: #d93025; margin-left: 4px; }
        .preview-image { max-width: 150px; border: 1px solid #dadce0; border-radius: 8px; margin-bottom: 10px; display: none; }
        .sample-image-box { max-width: 150px; border: 1px dashed #ccc; padding: 10px; text-align: center; background-color: #f8f9fa; }
        /* 他の画面と統一したpage-headerスタイル */
        .page-header { background-color: #fff; border-top: 8px solid #673ab7; border-radius: 8px; padding: 24px; }
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .file-input-wrapper input[type=file] { position: absolute; left: 0; top: 0; opacity: 0; font-size: 100px; cursor: pointer; }
        /* Googleフォーム風の下線入力フィールドスタイル */
        .form-control-gf {
            width: 100%;
            border: none;
            border-bottom: 1px solid #dadce0;
            border-radius: 0;
            padding: 6px 0;
            background-color: transparent;
            color: #202124;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease, border-width 0.1s ease;
        }
        .form-control-gf:focus {
            border-color: #673ab7;
            border-bottom: 2px solid #673ab7;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="container form-container">
    <div class="page-header d-flex align-items-center justify-content-between mb-4">
        <div class="d-flex align-items-center">
            <a href="{{ url_for('student.student_list') }}" class="btn btn-primary me-3" title="一覧へ戻る">
                <i class="bi bi-chevron-left"></i>
            </a>
            <div>
                <h1 class="h4 mb-0">新規受講生の登録＆学習記録</h1>
                <p class="text-muted mb-0 small">初めての受講生について、顔写真の撮影、受講生登録、本日の学習内容を入力してください。</p>
            </div>
        </div>
        <div class="text-danger small ms-3 text-nowrap">* 必須項目</div>
    </div>

    <form action="{{ url_for('student.create_student') }}" method="POST" enctype="multipart/form-data">
        <div class="card-question shadow-sm">
            <label class="form-label fw-bold">(1) 顔写真のアップロード <span class="text-muted fw-normal small">※スマホで受講生の顔写真を撮影し、アップロードしてください (最大10MB)</span></label>
            <div class="mb-3">
                <img id="image_preview" src="#" alt="プレビュー" class="preview-image">
                <div id="sample_box" class="sample-image-box mb-2 small text-muted"><span style="font-size: 2rem;">👤</span><br>顔写真の見本</div>
                <div class="file-input-wrapper">
                    <button type="button" class="btn btn-outline-primary btn-sm d-flex align-items-center gap-1">
                        <i class="bi bi-file-earmark-arrow-up"></i> 画像を選択
                    </button>
                    <input type="file" name="face_photo" id="face_photo_input" accept="image/*" {% if not staff %}required{% endif %}>
                </div>
                <span id="file_name_display" class="text-muted ms-2" style="font-size: 13px;"></span>
            </div>
        </div>

        <div class="card-question shadow-sm">
            <label for="student_name_kana" class="form-label fw-bold">(2) 受講生の氏名（カタカナ） <span class="required-star">*</span></label>
            <input type="text" class="form-control border-0 border-bottom rounded-0 px-0" id="student_name_kana" placeholder="ヤマダ　タロウ" name="student_name_kana" required>
        </div>

        <div class="card-question shadow-sm">
            <label for="country_of_origin" class="form-label fw-bold">(3) 出身国 <span class="required-star">*</span></label>
            <input type="text" class="form-control border-0 border-bottom rounded-0 px-0" id="country_of_origin" name="country_of_origin" placeholder="回答を入力" required>
            <div id="country-feedback" class="small text-muted mt-1">国名を入力すると母語が自動入力されます</div>
        </div>

        <div class="card-question shadow-sm">
            <label for="native_language" class="form-label fw-bold">(4) 話す言葉（母語） <span class="required-star">*</span></label>
            <input type="text" class="form-control border-0 border-bottom rounded-0 px-0" id="native_language" name="native_language" placeholder="回答を入力" required>
        </div>

        <div class="card-question shadow-sm">
            <label for="other_languages" class="form-label fw-bold">(5) 話す言葉（母語以外）</label>
            <input type="text" class="form-control border-0 border-bottom rounded-0 px-0" id="other_languages" name="other_languages" placeholder="回答を入力">
        </div>

        <div class="card-question shadow-sm">
            <label for="occupation" class="form-label fw-bold">(6) 職業</label>
            <input type="text" class="form-control border-0 border-bottom rounded-0 px-0" id="occupation" name="occupation" placeholder="回答を入力">
        </div>

        <!-- 既存の階層プルダウン（前回の回答のもの） -->
        <div class="card-question shadow-sm">
            <label for="region-select" class="form-label fw-bold">(7) 居住地域 <span class="required-star">*</span></label>
            <div class="mb-3">
                <input type="text" id="area-search" class="form-control-gf" placeholder="🔍 市区町村名で検索 (例: 春日部市)">
                <div id="search-feedback" class="small text-muted mt-1">入力してEnterを押すと該当する地域を自動で選択します</div>
            </div>
            <div class="row g-2">
                <div class="col-md-4">
                    <select id="region-select" class="form-select">
                        <option value="">地方を選択</option>
                        {% for region in region_data.keys() %}
                        <option value="{{ region }}">{{ region }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <select id="pref-select" class="form-select" disabled>
                        <option value="">都道府県を選択</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <select id="city-select" name="residential_area" class="form-select" disabled required>
                        <option value="">市区町村を選択</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card-question shadow-sm">
            <label for="jlpt_level" class="form-label fw-bold">(8) 日本語能力試験（JLPT）取得レベル <span class="required-star">*</span></label>
            <select class="form-select w-50" id="jlpt_level" name="jlpt_level" required>
                <option value="" selected disabled>選択</option>
                <option value="N1">N1</option>
                <option value="N2">N2</option>
                <option value="N3">N3</option>
                <option value="N4">N4</option>
                <option value="N5">N5</option>
                <option value="なし">なし</option>
            </select>
        </div>

        <div class="card-question shadow-sm">
            <label for="learning_purpose" class="form-label fw-bold">(9) 日本語学習の目的、目標、期限</label>
            <textarea class="form-control border-0 border-bottom rounded-0 px-0" id="learning_purpose" name="learning_purpose" rows="2" placeholder="回答を入力"></textarea>
        </div>

        <div class="card-question shadow-sm">
            <label for="life_troubles" class="form-label fw-bold">(10) 現在、生活で困っていること、わからない事</label>
            <textarea class="form-control border-0 border-bottom rounded-0 px-0" id="life_troubles" name="life_troubles" rows="2" placeholder="回答を入力"></textarea>
        </div>

        <div class="card-question shadow-sm">
            <label for="how_knew_class" class="form-label fw-bold">(11) どうやってこの日本語教室を知りましたか？ <span class="required-star">*</span></label>
            <select class="form-select w-50" id="how_knew_class" name="how_knew_class" required>
                <option value="" selected disabled>選択</option>
                <option value="知人の紹介">知人の紹介</option>
                <option value="GoogleMap">GoogleMap</option>
                <option value="SNS・インターネット">SNS・インターネット</option>
                <option value="市役所">市役所</option>
                <option value="武里団地のチラシ・ポスター">武里団地のチラシ・ポスター</option>
                <option value="その他">その他</option>
            </select>
        </div>

        <div class="card-question shadow-sm">
            <label for="how_knew_class_other" class="form-label fw-bold">(12) 上の(11)で「その他」を選んだ方は具体的に、どこでこの武里日本語教室を知ったか記入してください。</label>
            <input type="text" class="form-control border-0 border-bottom rounded-0 px-0" id="how_knew_class_other" name="how_knew_class_other" placeholder="回答を入力">
        </div>

        <div class="card-question shadow-sm">
            <label for="today_learning_content" class="form-label fw-bold">(13) 本日の学習内容 <span class="required-star">*</span><span class="text-muted fw-normal small">※本日学習した内容を入力してください。</span></label>
            <textarea class="form-control border-0 border-bottom rounded-0 px-0" id="today_learning_content" name="today_learning_content" rows="3" placeholder="回答を入力" required></textarea>
        </div>

        <div class="card-question shadow-sm">
            <label for="staff_in_charge" class="form-label fw-bold">(14) 記入担当者 <span class="required-star">*</span></label>
            <select class="form-select w-50" id="staff_in_charge" name="staff_in_charge" required>
                <option value="" selected disabled>選択</option>
                {% for staff in staff_list %}
            <option value="{{ staff.id }}">{{ staff.last_name_kanji  }}</option>
        {% endfor %}
            </select>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-5">
            <button type="submit" class="btn text-white px-4 fw-bold" style="background-color: #673ab7;">送信</button>
            <div class="d-flex gap-2">
                <a href="{{ url_for('student.student_list') }}" class="btn text-white px-4 fw-bold" style="background-color: #673ab7;" title="生徒一覧へ戻る">
                    戻る
                </a>
                <button type="reset" class="btn text-white px-4 fw-bold" style="background-color: #673ab7;">クリア</button>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('face_photo_input').onchange = function (evt) {
        const [file] = this.files;
        const preview = document.getElementById('image_preview');
        const sampleBox = document.getElementById('sample_box');
        const filenameDisplay = document.getElementById('file_name_display');
        if (file) {
            filenameDisplay.textContent = file.name;
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            sampleBox.style.display = 'none';
        } else {
            filenameDisplay.textContent = '';
            preview.style.display = 'none';
            sampleBox.style.display = 'block';
        }
    };

    const regionData = {{ region_data | tojson }};
    const regionSelect = document.getElementById('region-select');
    const prefSelect = document.getElementById('pref-select');
    const citySelect = document.getElementById('city-select');
    
    // 既存の階層プルダウンのロジック
    regionSelect.addEventListener('change', function() {
        const region = this.value;
        prefSelect.innerHTML = '<option value="">都道府県を選択</option>';
        citySelect.innerHTML = '<option value="">市区町村を選択</option>';
        prefSelect.disabled = true;
        citySelect.disabled = true;

        if (region && regionData[region]) {
            Object.keys(regionData[region]).forEach(pref => {
                const opt = document.createElement('option');
                opt.value = pref;
                opt.textContent = pref;
                prefSelect.appendChild(opt);
            });
            prefSelect.disabled = false;
        }
    });

    prefSelect.addEventListener('change', function() {
        const region = regionSelect.value;
        const pref = this.value;
        citySelect.innerHTML = '<option value="">市区町村を選択</option>';
        citySelect.disabled = true;

        if (region && pref && regionData[region][pref]) {
            regionData[region][pref].forEach(city => {
                const opt = document.createElement('option');
                opt.value = city;
                opt.textContent = city;
                citySelect.appendChild(opt);
            });
            citySelect.disabled = false;
        }
    });

    function updateDropdownsFromAddress(prefecture, city) {
        let foundRegion = null;
        for (const region in regionData) {
            if (regionData[region][prefecture]) {
                foundRegion = region;
                break;
            }
        }

        if (foundRegion) {
            regionSelect.value = foundRegion;
            regionSelect.dispatchEvent(new Event('change')); // 都道府県リストを更新

            prefSelect.value = prefecture;
            prefSelect.dispatchEvent(new Event('change')); // 市区町村リストを更新

            citySelect.value = city;
            citySelect.focus();
            citySelect.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else {
            alert(`「${prefecture}」または「${city}」は定義された地域データに見つかりませんでした。手動で選択してください。`);
        }
    }

    // --- 居住地域のキーワード検索機能 ---
    const areaSearchInput = document.getElementById('area-search');
    const searchFeedback = document.getElementById('search-feedback');
    
    areaSearchInput.addEventListener('keydown', function(event) {
        // IME変換中（未確定）のEnterキー入力は無視する
        if (event.isComposing || event.keyCode === 229) {
            return;
        }
        if (event.key === 'Enter') {
            event.preventDefault(); // Enterキーによるフォーム送信などを防止
            const query = this.value.trim();
            
            // 以前のフィードバックをクリアし、スタイルをリセット
            searchFeedback.textContent = ''; 
            searchFeedback.style.color = '#6c757d'; 
            // 2文字以上で検索開始
            if (query.length < 2) {
                searchFeedback.textContent = '入力してEnterを押すと該当する地域を自動で選択します';
                searchFeedback.style.color = '#6c757d';
                return;
            }
    
            let found = false;
            let foundPref = '';
            let foundCity = '';
            for (const region in regionData) {
                for (const pref in regionData[region]) {
                    const city = regionData[region][pref].find(c => c.includes(query));
                    if (city) {
                        foundPref = pref;
                        foundCity = city;
                        found = true;
                        break;
                    }
                }
                if (found) break;
            }
            if (found) {
                updateDropdownsFromAddress(foundPref, foundCity);
                searchFeedback.textContent = `✅ 「${foundPref} ${foundCity}」を見つけて選択しました`;
                searchFeedback.style.color = '#198754';
            } else {
                searchFeedback.textContent = `「${query}」に一致する地域は見つかりませんでした。`;
                searchFeedback.style.color = '#dc3545'; // 見つからない場合は赤色
            }
        }
    });

    // --- 出身国から母語を自動入力する機能 ---
    const motherLanguageData = {{ mother_language_data | default({}) | tojson }};
    const countryInput = document.getElementById('country_of_origin');
    const nativeLangInput = document.getElementById('native_language');

    countryInput.addEventListener('input', function() {
        const countryName = this.value.trim();
        if (motherLanguageData[countryName]) {
            // 複数の言語がある場合は「、」で繋いで表示
            nativeLangInput.value = motherLanguageData[countryName].join('、');
        }
    });
</script>


</body>
</html>
