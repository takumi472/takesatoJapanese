<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学習記録編集 - 武里日本語教室</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/icon-192.png') }}?v=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Vercel Speed Insights -->
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    {% if not config.DEBUG %}
  <script src="/_vercel/speed-insights/script.js" defer></script>
{% endif %}
    <style>
        body { background-color: #f0ebf8; font-family: 'Helvetica Neue', Arial, sans-serif; }
        .form-header { background-color: #fff; border-top: 8px solid #673ab7; border-radius: 8px; padding: 30px; }
        .page-header { background-color: #fff; border-top: 8px solid #673ab7; border-radius: 8px; padding: 24px; }
        .form-card { background-color: #fff; border: 1px solid #dadce0; border-radius: 8px; padding: 25px; margin-top: 20px; }
        .btn-update { background-color: #673ab7; color: white; }
        .btn-update:hover { background-color: #512da8; color: white; }
    </style>
</head>
<body>

<div class="container my-5" style="max-width: 700px;">

    <div class="page-header d-flex align-items-center justify-content-between mb-4">
        <div class="d-flex align-items-center">
            <a href="#" onclick="window.history.back(); return false;" class="btn btn-primary me-3" title="戻る">
                <i class="bi bi-chevron-left"></i>
            </a>
            <div>
                <h1 class="h4 mb-0">学習記録入力フォーム</h1>
                <p class="text-muted mb-0 small">本日のレッスン内容を記録してください。</p>
            </div>
        </div>
    </div>

    <form method="POST">
        <div class="form-card shadow-sm">
            <div class="mb-4">
                <label class="form-label">レッスン日</label>
                <input type="date" name="lesson_date" class="form-control" 
                       value="{{ record.lesson_date.strftime('%Y-%m-%d') }}" required>
            </div>

            <div class="mb-4">
                <label class="form-label">担当受講生</label>
                <input type="text" class="form-control bg-light" value="{{ record.student.name_kana }}" readonly>
            </div>

            <div class="mb-4">
                <label class="form-label">学習内容（テキストブック回数）</label>
                <select name="textbook_progress" class="form-select">
                    <option value="">選択してください</option>
                    <option value="ゼロ初級テキスト 利用せず">ゼロ初級テキスト 利用せず</option>
                    {% for i in range(1, 5) %}
                    <option value="ゼロ初級テキスト 第{{i}}回目">ゼロ初級テキスト 第{{i}}回目</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label">学習内容の詳細</label>
                {% set is_editable = (current_user.role == 'admin' or current_user.id == record.staff_id) %}

<textarea name="today_learning_content" class="form-control" rows="5" 
          {% if not is_editable %}readonly{% endif %}>
    {{ record.today_learning_content }}
</textarea>
            </div>

            <div class="d-flex justify-content-end gap-3 mt-4">
                <a href="{{ url_for('record.record_list', student_id=record.student_id) }}" class="btn btn-outline-secondary">キャンセル</a>
                {% if is_editable %}
    <button type="submit" class="btn btn-update">更新する</button>
{% endif %}
            </div>
        </div>
    </form>
</div>
</body>
</html>
